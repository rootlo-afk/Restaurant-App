<!DOCTYPE html>
<html>
<head>
  <title>Theke</title>
  <style>
    body { font-family: Arial; }
    .order {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
    }
    .fertig {
      background: #2ecc71;
      color: white;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🍺 Theke</h1>
<div id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  databaseURL: "https://oberkellner-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "oberkellner-app",
  storageBucket: "oberkellner-app.firebasestorage.app",
  messagingSenderId: "250391563416",
  appId: "1:250391563416:web:503f9d74a08cfc0e7bd4ed"
};

firebase.initializeApp(firebaseConfig);

var ordersDiv = document.getElementById("orders");

firebase.database().ref("bar").on("value", function(snapshot) {
  ordersDiv.innerHTML = "";

  snapshot.forEach(function(tableSnap) {
    let tableId = tableSnap.key;

    let tableDiv = document.createElement("div");
    tableDiv.innerHTML = `<h2>🪑 Tisch ${tableId}</h2>`;

    tableSnap.forEach(orderSnap => {
      let orderId = orderSnap.key;
      let data = orderSnap.val();

      let orderDiv = document.createElement("div");
      orderDiv.className = "order";

      // 🔥 wenn fertig → grün anzeigen
      if (data.status === "fertig") {
        orderDiv.classList.add("fertig");
      }

      let items = data.items.map(i => `• ${i.name} x${i.qty}`).join("<br>");

      orderDiv.innerHTML = items;

      // ✅ Fertig-Button nur wenn noch offen
      if (data.status !== "fertig") {

        let btn = document.createElement("button");
        btn.innerText = "✅ Fertig";

        btn.onclick = () => {
          firebase.database()
            .ref(`bar/${tableId}/${orderId}`)
            .update({
              status: "fertig"
            });
        };

        orderDiv.appendChild(document.createElement("br"));
        orderDiv.appendChild(btn);
      }

      tableDiv.appendChild(orderDiv);
    });

    ordersDiv.appendChild(tableDiv);
  });
});
</script>

</body>
</html>
