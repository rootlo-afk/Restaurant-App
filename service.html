<!DOCTYPE html>
<html>
<head>
  <title>Service</title>
  <style>
    body { font-family: Arial; text-align: center; }
    button { padding: 15px; margin: 5px; font-size: 18px; }
    .category { margin-top: 20px; }

    .container { display: flex; }
    .left { width: 50%; padding: 10px; }
    .right { width: 50%; padding: 10px; background: #f5f5f5; }
  </style>
</head>
<body>

<h1>Bestellung</h1>

<select id="table"></select><br>

<h2>Kategorien</h2>
<div id="categories"></div>

<h2>Warenkorb</h2>
<div id="cart"></div>
<h3 id="total">Neue Bestellung: 0€</h3>

<button onclick="sendOrder()">✅ Senden</button>

<hr>

<div class="container">

  <!-- LINKS -->
  <div class="left">
<h2>Tische</h2>
<div id="tables" style="
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
"></div>
  </div>

  <!-- RECHTS -->
  <div class="right">
    <h2>💳 Zahlung</h2>
    <div id="payment"></div>
    <h3 id="payTotal">0€</h3>
    <button onclick="confirmPayment()">✅ Bezahlen</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  databaseURL: "https://oberkellner-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "oberkellner-app",
  storageBucket: "oberkellner-app.firebasestorage.app",
  messagingSenderId: "250391563416",
  appId: "1:250391563416:web:503f9d74a08cfc0e7bd4ed"
};

firebase.initializeApp(firebaseConfig);

// 🍽️ Menü
const menu = {
  "Essen": [
    { name: "Pizza", price: 10, type: "food" },
    { name: "Pasta", price: 9, type: "food" },
    { name: "Schnitzel", price: 25.90, type: "food" }
  ],
  "Getränke": [
    { name: "Cola", price: 3, type: "drink" },
    { name: "Bier", price: 4, type: "drink" }
  ],
  "Dessert": [
    { name: "Eis", price: 5, type: "food" }
  ]
};

let cart = {};
let paymentList = [];

const catDiv = document.getElementById("categories");
const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");
const tablesDiv = document.getElementById("tables");
const tableSelect = document.getElementById("table");

// Anzahl Tische
const tableCount = 10;

// Standardoption
let defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.text = "Tisch wählen";
defaultOption.disabled = true;
defaultOption.selected = true;
tableSelect.appendChild(defaultOption);

// Tische erzeugen
for (let i = 1; i <= tableCount; i++) {
  let option = document.createElement("option");
  option.value = i;
  option.text = "Tisch " + i;
  tableSelect.appendChild(option);
}

// Menü anzeigen
for (let cat in menu) {
  let div = document.createElement("div");
  div.innerHTML = `<h3>${cat}</h3>`;

  menu[cat].forEach(item => {
    let btn = document.createElement("button");
    btn.innerText = item.name + " (" + item.price.toFixed(2) + "€)";
    btn.onclick = () => addToCart(item);
    div.appendChild(btn);
  });

  catDiv.appendChild(div);
}

// Warenkorb
function addToCart(item) {
  if (!cart[item.name]) cart[item.name] = { ...item, qty: 0 };
  cart[item.name].qty++;
  renderCart();
}

function renderCart() {
  cartDiv.innerHTML = "";
  let total = 0;

  Object.values(cart).forEach(item => {
    total += item.price * item.qty;

    let div = document.createElement("div");
    div.innerHTML = `
      ${item.name} x${item.qty}
      <button onclick="changeQty('${item.name}', -1)">➖</button>
      <button onclick="changeQty('${item.name}', 1)">➕</button>
    `;
    cartDiv.appendChild(div);
  });

  totalDiv.innerText = "Neue Bestellung: " + total.toFixed(2) + "€";
}

function changeQty(name, delta) {
  cart[name].qty += delta;
  if (cart[name].qty <= 0) delete cart[name];
  renderCart();
}

// Bestellung senden
function sendOrder() {
  let table = document.getElementById("table").value;

  if (!table || Object.keys(cart).length === 0) {
    alert("Tisch & Bestellung nötig!");
    return;
  }

  let allItems = Object.values(cart);

  let kitchenItems = [];
  let barItems = [];

  allItems.forEach(item => {
    if (item.type === "drink") {
      barItems.push(item);
    } else {
      kitchenItems.push(item);
    }
  });

  // 🔥 EINMAL ID ERZEUGEN
  let newOrderRef = firebase.database().ref("tables/" + table + "/orders").push();
  let orderId = newOrderRef.key;

  let total = allItems.reduce((sum, i) => sum + i.price * i.qty, 0);

  // 👉 TABLES
  newOrderRef.set({
    items: allItems,
    total: total,
    status: "offen",
    time: Date.now()
  });

  // 👉 KÜCHE
  if (kitchenItems.length > 0) {
    firebase.database().ref("kitchen/" + table + "/" + orderId).set({
      items: kitchenItems,
      status: "offen",
      time: Date.now()
    });
  }

  // 👉 BAR
  if (barItems.length > 0) {
    firebase.database().ref("bar/" + table + "/" + orderId).set({
      items: barItems,
      status: "offen",
      time: Date.now()
    });
  }

  cart = {};
  renderCart();
}

// Tische anzeigen
firebase.database().ref("tables").on("value", (snapshot) => {
  tablesDiv.innerHTML = "";

  for (let i = 1; i <= tableCount; i++) {

    let tableId = i.toString();
    let tableSnap = snapshot.child(tableId);

    let hasOrders = false;
    let hasFinished = false;
    let total = 0;

    if (tableSnap.exists() && tableSnap.child("orders").exists()) {

  let orders = tableSnap.child("orders");

  hasOrders = true;

  orders.forEach(orderSnap => {
        let data = orderSnap.val();
        hasOrders = true;
        total += Number(data.total) || 0;

        if (data.status === "fertig") {
          hasFinished = true;
        }
      });
    }

    let bg = "#bdc3c7";

    if (hasOrders) bg = "#e74c3c";
    if (hasFinished) bg = "#f39c12";

    let btn = document.createElement("div");

    btn.style.background = bg;
    btn.style.padding = "30px";
    btn.style.borderRadius = "15px";
    btn.style.color = "white";
    btn.style.fontSize = "20px";
    btn.style.cursor = "pointer";
    btn.style.textAlign = "center";

btn.innerHTML = `
  🪑 Tisch ${tableId}<br>
  ${hasOrders ? total.toFixed(2) + "€" : "frei"}
  ${hasOrders ? `<br><button onclick="loadFullPayment('${tableId}'); event.stopPropagation();">💰 Alles</button>` : ""}
`;

    if (hasOrders) {
      btn.onclick = () => openTableDetails(tableId);
    }

    tablesDiv.appendChild(btn);
  }
});

// Zahlung
function addToPayment(tableId, orderId, name, price) {
  paymentList.push({ tableId, orderId, name, price });
  renderPayment();
}

function renderPayment() {
  const div = document.getElementById("payment");
  
  const totalDiv = document.getElementById("payTotal");

  div.innerHTML = "";
  let total = 0;

  paymentList.forEach((item, index) => {
    total += item.price;

    let el = document.createElement("div");
    el.innerHTML = `
      ${item.name} (${item.price}€)
      <button onclick="removeFromPayment(${index})">❌</button>
    `;
    div.appendChild(el);
  });

  totalDiv.innerText = total.toFixed(2) + "€";
}

function removeFromPayment(index) {
  paymentList.splice(index, 1);
  renderPayment();
}

// Zahlung bestätigen
function confirmPayment() {
  if (paymentList.length === 0) return;

  let grouped = {};

  paymentList.forEach(item => {
    let key = item.tableId + "_" + item.orderId;

    if (!grouped[key]) {
      grouped[key] = {
        tableId: item.tableId,
        orderId: item.orderId,
        items: []
      };
    }

    grouped[key].items.push(item.name);
  });

  let promises = [];

  Object.values(grouped).forEach(group => {
    let ref = firebase.database().ref(`tables/${group.tableId}/orders/${group.orderId}`);

    let p = ref.once("value").then(snapshot => {
      let data = snapshot.val();
      if (!data) return;

group.items.forEach(name => {

  let index = data.items.findIndex(i => i.name === name);

  if (index !== -1) {
    data.items[index].qty--;

    if (data.items[index].qty <= 0) {
      data.items.splice(index, 1);
    }
  }

});

      data.items = data.items.filter(i => i.qty > 0);
      data.total = data.items.reduce((s, i) => s + i.price * i.qty, 0);

      if (data.items.length === 0) {
        return ref.remove();
      } else {
        return ref.set(data);
      }
    });

    promises.push(p);
  });

  // 🔥 NUR EIN Promise.all!
  Promise.all(promises).then(() => {

    let tablesToCheck = [...new Set(paymentList.map(i => i.tableId))];

    tablesToCheck.forEach(tableId => {

      firebase.database().ref("tables/" + tableId + "/orders").once("value")
        .then(snapshot => {

          if (!snapshot.exists()) {
            firebase.database().ref("tables/" + tableId).remove();
            firebase.database().ref("kitchen/" + tableId).remove();
            firebase.database().ref("bar/" + tableId).remove();
          }

        });

    });

    paymentList = [];
    renderPayment();
  });
}

// Tisch abrechnen
function closeTable(tableId) {
  if (!confirm("Tisch abrechnen?")) return;
  firebase.database().ref("tables/" + tableId).remove();
}
function loadFullPayment(tableId) {
  paymentList = []; // vorherige Zahlung leeren

  firebase.database().ref("tables/" + tableId + "/orders").once("value")
    .then(snapshot => {

      snapshot.forEach(orderSnap => {
        let data = orderSnap.val();

        data.items.forEach(item => {
          for (let i = 0; i < item.qty; i++) {
            paymentList.push({
              tableId: tableId,
              orderId: orderSnap.key,
              name: item.name,
              price: item.price
            });
          }
        });
      });

      renderPayment();
    });
}

function openTableDetails(tableId) {

  paymentList = [];

  firebase.database().ref("tables/" + tableId + "/orders").once("value")
    .then(snapshot => {

      const div = document.getElementById("payment");
      div.innerHTML = `<h3>🪑 Tisch ${tableId}</h3>`;

      let total = 0;

      snapshot.forEach(orderSnap => {
        let data = orderSnap.val();

        data.items.forEach(item => {
          for (let i = 0; i < item.qty; i++) {

            total += item.price;

            let btn = document.createElement("button");
            btn.style.display = "block";
            btn.style.width = "100%";

            btn.innerText = item.name + " (" + item.price.toFixed(2) + "€)";

            btn.onclick = () => {
              paymentList.push({
                tableId: tableId,
                orderId: orderSnap.key,
                name: item.name,
                price: item.price
              });
              renderPayment();
            };

            div.appendChild(btn);
          }
        });
      });

      document.getElementById("payTotal").innerText = total.toFixed(2) + "€";
    });
}
</script>

</body>
</html>
