<!DOCTYPE html>
<html>
<head>
  <title>Service</title>
  <style>
    body { font-family: Arial; text-align: center; }
    button { padding: 15px; margin: 5px; font-size: 18px; }
    .category { margin-top: 20px; }

    .container { display: flex; }
    .left { width: 50%; padding: 10px; }
    .right { width: 50%; padding: 10px; background: #f5f5f5; }
  </style>
</head>
<body>

<h1>Bestellung</h1>

<select id="table"></select><br>



<div id="categories"></div>

<h2>Warenkorb</h2>
<div id="cart"></div>
<h3 id="total">Neue Bestellung: 0€</h3>

<button onclick="sendOrder()">✅ Senden</button>

<hr>

<div class="container">

  <!-- LINKS -->
  <div class="left">
<h2>Tische</h2>
<select id="tableRange" onchange="renderTables()">
  <option value="1-10">Tische 1–10</option>
  <option value="11-20">Tische 11–20</option>
  <option value="21-30">Tische 21–30</option>
</select>
<div id="tables" style="
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
"></div>
  </div>

  <!-- RECHTS -->
<div class="right">
  <div style="text-align:right; font-size:12px;">
    📅 Heute: <span id="salesToday">0€</span><br>
    📆 Monat: <span id="salesMonth">0€</span>
  </div>

  <h2>💳 Zahlung</h2>
  <div id="payment"></div>
  <h3 id="payTotal">0€</h3>
  <button onclick="confirmPayment()">✅ Bezahlen</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyBFJ6n7f3U3qpfezvqTgx9vugOpMSp284o",
  authDomain: "oberkellner-app.firebaseapp.com",
  databaseURL: "https://oberkellner-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "oberkellner-app",
  storageBucket: "oberkellner-app.firebasestorage.app",
  messagingSenderId: "250391563416",
  appId: "1:250391563416:web:503f9d74a08cfc0e7bd4ed"
};

firebase.initializeApp(firebaseConfig);

// 🍽️ Menü


let cart = {};
let paymentList = [];

const catDiv = document.getElementById("categories");
const cartDiv = document.getElementById("cart");
const totalDiv = document.getElementById("total");
const tablesDiv = document.getElementById("tables");
const tableSelect = document.getElementById("table");

// Anzahl Tische
const tableCount = 10;

// Standardoption
let defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.text = "Tisch wählen";
defaultOption.disabled = true;
defaultOption.selected = true;
tableSelect.appendChild(defaultOption);

// Tische erzeugen
for (let i = 1; i <= tableCount; i++) {
  let option = document.createElement("option");
  option.value = i;
  option.text = "Tisch " + i;
  tableSelect.appendChild(option);
}

// Menü anzeigen
firebase.database().ref("menu").on("value", snapshot => {

  catDiv.innerHTML = "";

  // 🔥 Kategorien sammeln
  let categories = [];

  snapshot.forEach(catSnap => {
    categories.push({
      name: catSnap.key,
      data: catSnap
    });
  });

  // 🎯 gewünschte Reihenfolge
  const order = ["Getränke", "Salate", "Hauptgerichte", "Extras", "Dessert"];

  // 🔥 sortieren
  categories.sort((a, b) => {
    return order.indexOf(a.name) - order.indexOf(b.name);
  });

  // 🔥 anzeigen
  categories.forEach(cat => {

    let catName = cat.name;
    let catSnap = cat.data;

    let div = document.createElement("div");
    div.innerHTML = `<h4>${catName}</h4>`;

 // 🔥 Items sammeln
let items = [];

catSnap.forEach(itemSnap => {
items.push({
  key: itemSnap.key,
  ...itemSnap.val(),
  category: catName // 🔥 wenn DAS FEHLT werden die Extras nicht direkt den Gericht zugeordnet
});
});

// 🔥 Alphabetisch sortieren
items.sort((a, b) => a.name.localeCompare(b.name, "de"));

// 🔥 Anzeigen
items.forEach(item => {

  let btn = document.createElement("button");

  btn.style.background = "#f8f9fa";
  btn.style.border = "1px solid #ccc";
  btn.style.cursor = "pointer";

  btn.onmouseover = () => {
    btn.style.background = "#dfe6e9";
  };

  btn.onmouseout = () => {
    btn.style.background = "#f8f9fa";
  };

  btn.innerText = item.name + " (" + item.price.toFixed(2) + "€)";
  btn.onclick = () => addToCart(item);

  div.appendChild(btn);

});

    catDiv.appendChild(div);
  });

});

// Warenkorb
function addToCart(item) {

  // EXTRA
  if (item.category === "Extras") {

    let lastKey = Object.keys(cart).slice(-1)[0];

    if (!lastKey) {
      alert("Erst Gericht wählen!");
      return;
    }

    if (!cart[lastKey].extras) cart[lastKey].extras = [];

    cart[lastKey].extras.push({
      name: item.name,
      price: Number(item.price)
    });

    renderCart();
    return;
  }

  // GERICHT
  let id = Date.now() + Math.random();

  cart[id] = {
    name: item.name,
    price: Number(item.price),
    qty: 1,
    type: item.type,
    extras: []
  };

  renderCart();
}

function renderCart() {
  cartDiv.innerHTML = "";
  let total = 0;

  Object.entries(cart).forEach(([id, item]) => {

    let itemTotal = item.price * item.qty;

    // 🔥 Extras korrekt berechnen
    if (item.extras) {
      let extrasTotal = item.extras.reduce((s, e) => s + e.price, 0);
      itemTotal += extrasTotal * item.qty;
    }

    total += itemTotal;

    let div = document.createElement("div");

    let extrasText = "";

    if (item.extras && item.extras.length > 0) {
      extrasText = item.extras
        .map(e => "➕ " + e.name + " (+" + e.price.toFixed(2) + "€)")
        .join("<br>");
    }

    div.innerHTML = `
      <b>${item.name} x${item.qty}</b><br>
      ${extrasText}
      <br>
      <button onclick="changeQty('${id}', -1)">➖</button>
      <button onclick="changeQty('${id}', 1)">➕</button>
    `;

    cartDiv.appendChild(div);
  });

  totalDiv.innerText = "Neue Bestellung: " + total.toFixed(2) + "€";
}

function changeQty(id, delta) {
  cart[id].qty += delta;

  if (cart[id].qty <= 0) delete cart[id];

  renderCart();
}

// Bestellung senden
function sendOrder() {
  let table = document.getElementById("table").value;

  if (!table || Object.keys(cart).length === 0) {
    alert("Tisch & Bestellung nötig!");
    return;
  }

  let allItems = Object.values(cart).map(item => ({
  name: item.name,
  price: item.price,
  qty: item.qty,
  type: item.type,
  extras: item.extras || []
}));

  let kitchenItems = [];
  let barItems = [];

  allItems.forEach(item => {
  if (item.type === "drink") {
    barItems.push(item);
  } else {
    kitchenItems.push(item);
  }
});

  // 🔥 EINMAL ID ERZEUGEN
  let newOrderRef = firebase.database().ref("tables/" + table + "/orders").push();
  let orderId = newOrderRef.key;

  let total = allItems.reduce((sum, i) => {

  let itemTotal = i.price * i.qty;

  if (i.extras && i.extras.length > 0) {
    let extrasTotal = i.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
    itemTotal += extrasTotal;
  }

  return sum + itemTotal;

}, 0);

  // 👉 TABLES
  newOrderRef.set({
    items: allItems,
    total: total,
    status: "offen",
    time: Date.now()
  });

  // 👉 KÜCHE
  if (kitchenItems.length > 0) {
    firebase.database().ref("kitchen/" + table + "/" + orderId).set({
      items: kitchenItems,
      status: "offen",
      time: Date.now()
    });
  }

  // 👉 BAR
  if (barItems.length > 0) {
    firebase.database().ref("bar/" + table + "/" + orderId).set({
      items: barItems,
      status: "offen",
      time: Date.now()
    });
  }

  cart = {};
  renderCart();
}



// Zahlung
function addToPayment(tableId, orderId, name, price) {


firebase.database().ref("sales").push({
  amount: totalPaid,
  time: Date.now()
});
  paymentList.push({ tableId, orderId, name, price });
  renderPayment();
}

function renderPayment() {
  const div = document.getElementById("payment");
  
  const totalDiv = document.getElementById("payTotal");

  div.innerHTML = "";
  let total = 0;

  paymentList.forEach((item, index) => {
    let itemPrice = item.price;

if (item.extras) {
  let extrasTotal = item.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
  itemPrice += extrasTotal;
}

total += itemPrice;

    let el = document.createElement("div");
el.innerHTML = `
  ${item.name} (${item.price.toFixed(2)}€)
  <button onclick="removeFromPayment(${index})">❌</button>
`;
    div.appendChild(el);
  });

  totalDiv.innerText = total.toFixed(2) + "€";
}

function removeFromPayment(index) {
  paymentList.splice(index, 1);
  renderPayment();
}

// Zahlung bestätigen

function confirmPayment() {
  if (paymentList.length === 0) {
    alert("Keine Zahlung ausgewählt!");
    return;
  }

  // 🔥 1. Betrag berechnen
  let totalPaid = paymentList.reduce((sum, i) => sum + (Number(i.price) || 0), 0);

  console.log("💰 Zahlung:", totalPaid);

  // ❗ WICHTIG: sofort speichern (BEVOR irgendwas gelöscht wird)
  firebase.database().ref("sales").push({
    amount: totalPaid,
    time: Date.now()
  });

  // 🔥 2. Bestellungen bearbeiten
  let grouped = {};

  paymentList.forEach(item => {
    let key = item.tableId + "_" + item.orderId;

    if (!grouped[key]) {
      grouped[key] = {
        tableId: item.tableId,
        orderId: item.orderId,
        items: []
      };
    }

    grouped[key].items.push(item.name);
  });

  let promises = [];

  Object.values(grouped).forEach(group => {
    let ref = firebase.database().ref(`tables/${group.tableId}/orders/${group.orderId}`);

    let p = ref.once("value").then(snapshot => {
      let data = snapshot.val();
      if (!data) return;

      group.items.forEach(name => {
        let index = data.items.findIndex(i => {

  let fullName = i.name;

  if (i.extras && i.extras.length > 0) {
    fullName += " + " + i.extras.map(e => e.name).join(", ");
  }

  return fullName === name;
});

        if (index !== -1) {
          data.items[index].qty--;

          if (data.items[index].qty <= 0) {
            data.items.splice(index, 1);
          }
        }
      });

      data.total = data.items.reduce((sum, i) => {

  let itemTotal = i.price * i.qty;

  if (i.extras && i.extras.length > 0) {
    let extrasTotal = i.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
    itemTotal += extrasTotal;
  }

  return sum + itemTotal;

}, 0);

      if (data.items.length === 0) {
        return ref.remove();
      } else {
        return ref.set(data);
      }
    });

    promises.push(p);
  });

  Promise.all(promises).then(() => {

    let tablesToCheck = [...new Set(paymentList.map(i => i.tableId))];

    tablesToCheck.forEach(tableId => {
      firebase.database().ref("tables/" + tableId + "/orders").once("value")
        .then(snapshot => {
          if (!snapshot.exists()) {
            firebase.database().ref("tables/" + tableId).remove();
            firebase.database().ref("kitchen/" + tableId).remove();
            firebase.database().ref("bar/" + tableId).remove();
          }
        });
    });


  let tableId = paymentList[0].tableId; // 🔥 Tisch merken

  paymentList = [];

  openTableDetails(tableId); // 🔥 Tisch neu laden = wie Klick


  });
}

// Tisch abrechnen
function closeTable(tableId) {
  if (!confirm("Tisch abrechnen?")) return;
  firebase.database().ref("tables/" + tableId).remove();
}
function loadFullPayment(tableId) {
  paymentList = []; // vorherige Zahlung leeren

  firebase.database().ref("tables/" + tableId + "/orders").once("value")
    .then(snapshot => {

      snapshot.forEach(orderSnap => {
        let data = orderSnap.val();

        data.items.forEach(item => {
  for (let i = 0; i < item.qty; i++) {

    let itemPrice = item.price;

    if (item.extras) {
      let extrasTotal = item.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
      itemPrice += extrasTotal;
    }
	
	let extrasText = "";

if (item.extras && item.extras.length > 0) {
  extrasText = " + " + item.extras.map(e => e.name).join(", ");
}


    paymentList.push({
      tableId: tableId,
      orderId: orderSnap.key,
      name: item.name + extrasText,
      price: itemPrice
    });
  }
});
      });

      renderPayment();
    });
}

function openTableDetails(tableId) {

  paymentList = [];

  firebase.database().ref("tables/" + tableId + "/orders").once("value")
    .then(snapshot => {

      const div = document.getElementById("payment");
      div.innerHTML = `<h3>🪑 Tisch ${tableId}</h3>`;

      let total = 0;

      snapshot.forEach(orderSnap => {
        let data = orderSnap.val();

        data.items.forEach((item, itemIndex) => {

          for (let i = 0; i < item.qty; i++) {

            // 🔥 EINDEUTIGE ID pro Position (WICHTIG!)
            let uniqueId = orderSnap.key + "_" + itemIndex + "_" + i;

            // ✅ Preis inkl Extras
            let itemPrice = item.price;

            if (item.extras && item.extras.length > 0) {
              let extrasTotal = item.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
              itemPrice += extrasTotal;
            }

            total += itemPrice;

            // 🔘 Button
            let btn = document.createElement("button");
            btn.style.display = "block";
            btn.style.width = "100%";

            let extrasText = "";

            if (item.extras && item.extras.length > 0) {
              extrasText = item.extras
                .map(e => "➕ " + e.name)
                .join("<br>");
            }

            btn.innerHTML = `
              ${item.name} (${itemPrice.toFixed(2)}€)
              <div style="font-size:12px; text-align:left;">
                ${extrasText}
              </div>
            `;

            // 👉 Klick = auswählen / abwählen
            btn.onclick = () => {

              let extrasLabel = "";

              if (item.extras && item.extras.length > 0) {
                extrasLabel = " + " + item.extras.map(e => e.name).join(", ");
              }

              let entry = {
                id: uniqueId, // 🔥 HIER IST DER FIX
                tableId: tableId,
                orderId: orderSnap.key,
                name: item.name + extrasLabel,
                price: itemPrice
              };

              let index = paymentList.findIndex(p => p.id === entry.id);

              if (index !== -1) {
                // ❌ entfernen
                paymentList.splice(index, 1);
                btn.style.background = "";
                btn.style.color = "black";
              } else {
                // ✅ hinzufügen
                paymentList.push(entry);
                btn.style.background = "#2ecc71";
                btn.style.color = "white";
              }

              updateSelectedTotal();
            };

            div.appendChild(btn);
          }

        });
      });

      // ❗ NICHT Gesamtpreis anzeigen → wir nutzen Auswahl
      updateSelectedTotal();
    });
}




function updateSelectedTotal() {

  let total = 0;

  paymentList.forEach(item => {
    total += Number(item.price) || 0;
  });

  // 🔥 DEBUG (optional)
  console.log("Ausgewählt:", paymentList);
  console.log("Summe:", total);

  document.getElementById("payTotal").innerText = total.toFixed(2) + "€";
}
// 🔥 HIER EINFÜGEN (ganz unten)
firebase.database().ref("sales").on("value", snapshot => {

  let todayTotal = 0;
  let monthTotal = 0;

  let now = new Date();

  let startOfDay = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate()
  ).getTime();

  let startOfMonth = new Date(
    now.getFullYear(),
    now.getMonth(),
    1
  ).getTime();

  snapshot.forEach(snap => {
    let data = snap.val();

    let amount = Number(data.amount) || 0;
    let time = Number(data.time) || 0;

    if (time >= startOfDay) {
      todayTotal += amount;
    }

    if (time >= startOfMonth) {
      monthTotal += amount;
    }
  });

  document.getElementById("salesToday").innerText = todayTotal.toFixed(2) + "€";
  document.getElementById("salesMonth").innerText = monthTotal.toFixed(2) + "€";
});
function renderTables() {

  renderTableSelect();

  // 🔥 alte Listener entfernen (wichtig!)
  firebase.database().ref("tables").off();

  firebase.database().ref("tables").on("value", snapshot => {

    tablesDiv.innerHTML = "";

    let range = document.getElementById("tableRange").value.split("-");
    let start = parseInt(range[0]);
    let end = parseInt(range[1]);

    for (let i = start; i <= end; i++) {

      let tableId = i.toString();
      let tableSnap = snapshot.child(tableId);

      let hasOrders = false;
      let hasFinished = false;
      let total = 0;

      if (tableSnap.exists() && tableSnap.child("orders").exists()) {

        let orders = tableSnap.child("orders");

        hasOrders = true;

        orders.forEach(orderSnap => {
          let data = orderSnap.val();

          data.items.forEach(i => {

            let itemTotal = i.price * i.qty;

            if (i.extras && i.extras.length > 0) {
              let extrasTotal = i.extras.reduce((s, e) => s + (Number(e.price) || 0), 0);
              itemTotal += extrasTotal;
            }

            total += itemTotal;
          });

          if (data.status === "fertig") {
            hasFinished = true;
          }
        });
      }

      let bg = "#bdc3c7";
      if (hasOrders) bg = "#e74c3c";
      if (hasFinished) bg = "#2ecc71";

      let btn = document.createElement("div");

      btn.style.background = bg;
      btn.style.padding = "30px";
      btn.style.borderRadius = "15px";
      btn.style.color = "white";
      btn.style.fontSize = "20px";
      btn.style.cursor = "pointer";
      btn.style.textAlign = "center";

	btn.innerHTML = `
	🪑 Tisch ${tableId}<br>
	${hasOrders ? total.toFixed(2) + "€" : "frei"}
	${hasOrders ? `<br><button onclick="loadFullPayment('${tableId}'); event.stopPropagation();">💰 Alles</button>` : ""}
	`;

      btn.onclick = () => {
        tableSelect.value = tableId;
        openTableDetails(tableId);
      };

      tablesDiv.appendChild(btn);
    }

  });
}
function renderTableSelect() {

  tableSelect.innerHTML = "";

  let range = document.getElementById("tableRange").value.split("-");
  let start = parseInt(range[0]);
  let end = parseInt(range[1]);

  let defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.text = "Tisch wählen";
  defaultOption.disabled = true;
  defaultOption.selected = true;
  tableSelect.appendChild(defaultOption);

  for (let i = start; i <= end; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.text = "Tisch " + i;
    tableSelect.appendChild(option);
  }
}
renderTables();
</script>

</body>
</html>
